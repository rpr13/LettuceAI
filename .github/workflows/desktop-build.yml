name: Desktop Build (Tauri)

on:
  push:
  workflow_dispatch:
    inputs:
      build_llama_cuda_linux:
        description: "Also build Linux desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean
      build_llama_vulkan_linux:
        description: "Also build Linux desktop with llama.cpp Vulkan support"
        required: false
        default: false
        type: boolean
      build_llama_cuda_windows:
        description: "Also build Windows desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean

jobs:
  linux:
    name: Linux Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb", "rpm"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          EOF

      - name: Build Tauri (Linux, Dev build)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
        run: bun run tauri build --config dev-config.json

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/**

      - name: Install Linux Vulkan dependencies (optional GPU task)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_vulkan_linux == true }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools

      - name: Build Tauri (Linux, llama.cpp CUDA)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_linux == true }}
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: src-tauri/target-cuda
        run: |
          bun run tauri build --config dev-config.json --features llama-gpu-cuda

      - name: Upload Linux CUDA artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_linux == true }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-llama-cuda
          path: |
            src-tauri/target-cuda/release/bundle/**

      - name: Build Tauri (Linux, llama.cpp Vulkan)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_vulkan_linux == true }}
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: src-tauri/target-vulkan
        run: |
          bun run tauri build --config dev-config.json --features llama-gpu-vulkan

      - name: Upload Linux Vulkan artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_vulkan_linux == true }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-llama-vulkan
          path: |
            src-tauri/target-vulkan/release/bundle/**

  windows:
    name: Windows Build
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          $SHORT_SHA = "${{ github.sha }}".Substring(0, 7)
          $VERSION = "0.1.${{ github.run_number }}"

          $devConfig = @"
          {
            "`$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "`$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          "@
          $devConfig | Out-File -FilePath dev-config.json -Encoding UTF8

      - name: Build Tauri (Windows, Dev build)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
        run: bun run tauri build --config dev-config.json

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/**

      - name: Build Tauri (Windows, llama.cpp CUDA)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_windows == true }}
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
          CARGO_TARGET_DIR: src-tauri/target-cuda
        run: bun run tauri build --config dev-config.json --features llama-gpu-cuda

      - name: Upload Windows CUDA artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_windows == true }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-llama-cuda
          path: |
            src-tauri/target-cuda/release/bundle/**
